  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';

<style>
  /* 基础变量 */
  :root {
    --bg-color: #ffffff;
    --text-color: #333333;
  }

  /* 暗色模式精准打击：彻底消除灰色导航栏 */
  [data-theme='dark'] {
    --bg-color: #1a1a1a;
    --text-color: #eeeeee;
  }

  /* 1. 强制应用背景和文字颜色 */
  [data-theme='dark'] body {
    background-color: var(--bg-color) !important;
    color: var(--text-color) !important;
  }

  /* 2. 覆盖导航栏所有可能的灰色层级 */
  [data-theme='dark'] .masthead,
  [data-theme='dark'] .masthead__inner-wrap,
  [data-theme='dark'] .greedy-nav,
  [data-theme='dark'] .greedy-nav ul,
  [data-theme='dark'] .greedy-nav button {
    background-color: var(--bg-color) !important; /* 强制统一为 #1a1a1a */
    box-shadow: none !important; /* 去除阴影 */
    border: none !important; /* 去除边框线 */
  }

  /* 3. 修正导航链接颜色（让蓝字在黑底上更明亮一点） */
  [data-theme='dark'] .masthead__menu-item a {
    color: #82adff !important;
  }
  
  /* 4. 修改鼠标悬停时的效果 */
  [data-theme='dark'] .masthead__menu-item a:hover {
    color: #ffffff !important;
    background-color: #333 !important;
  }

  /* 5. 处理页脚 */
  [data-theme='dark'] .page__footer {
    background-color: var(--bg-color) !important;
    border-top: 1px solid #333 !important;
  }
</style>
