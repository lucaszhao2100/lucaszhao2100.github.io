# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Chunyu Zhao"
title_separator          : "-"
name                     : &name "Chunyu Zhao"
description              : &description "Master's Student in Remote Sensing at Beijing Normal University"
url                      : "https://Lucaszhao2100.github.io"
baseurl                  : ""
repository               : "Lucaszhao2100/Lucaszhao2100.github.io"

# Site Author
author:
  avatar           : "image1.jpg"
  name             : "赵春宇 Chunyu Zhao⛷️"
  bio              : "Master's Student in Remote Sensing Science and Technology"
  location         : "Beijing, China"
  employer         : "Faculty of Geographical Science,<br>Beijing Normal University"
  email            : "chunyuz.zhao@gmail.com<br>zhaochunyu@mail.bnu.edu.cn"

  # Academic websites
  googlescholar    : "https://scholar.google.co.uk/citations?user=WczTXKEAAAAJ&hl=EN"
  orcid            : "https://orcid.org/my-orcid?orcid=0009-0002-4207-8538"
  researchgate     : "https://www.researchgate.net/profile/Chunyu-Zhao-15"

  # Repositories
  github           : Lucaszhao2100

# Publication Category
publication_category:
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# ==================== 优化1：开启AJAX无刷新导航（效果最明显） ====================
# 点击导航瞬间切换，没有白屏等待
ajax: true

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# ==================== 优化2：关闭所有不必要的功能 ====================
comments:
  provider               : false  # 关闭评论系统
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  hide                   : true  # 关闭RSS订阅（学术主页几乎用不到）
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# ==================== 优化3：关闭社交分享功能 ====================
# 移除所有页面的分享按钮，减少JS加载
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :
og_description           :
social:
  type                    : "Person"
  name                    : "Chunyu Zhao"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-L9XKP06DYV"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ==================== 优化4：全局关闭分享和评论 ====================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false  # 关闭阅读时间显示
      comments: false
      share: false
      related: false
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comment: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed  # 已经是压缩模式，保持不变

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai  # 优化5：改成中国时区，时间显示更准确

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# 优化6：移除不需要的插件
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]  # 优化7：移除所有HTML注释
  endings: all
  ignore:
    envs: development
  blanklines: false
